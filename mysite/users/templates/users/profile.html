{% extends 'myapp/base.html' %}
{% block body %}
<div class=" mt-24 flex  justify-center items-center ">
    <div class=" flex flex-col justify-center items-center gap-4 p-20 w-1/2 shadow-lg border-4 border-pink-400 bg-red-50" >
        <img class='w-64 h-64 object-contain border-red-500' src="{{ user.profile.image.url }}" alt="Profile Image">
        <h1 class="text-2xl">{{ user.username }}</h1>
        <h1 class="text-2xl">📞 {{ user.profile.contact_number }}</h1>
    </div>   

</div>   
<div class="flex justify-center "><p class="mt-4 text-gray-500 font-semibold">Wanna Edit ✍🏻??<a href="{% url 'users:create_profile' user.id %}" class="text-blue-500 hover:text-blue-700 text-green-500">Edit Here</a></p></div> 
{% endblock %}
