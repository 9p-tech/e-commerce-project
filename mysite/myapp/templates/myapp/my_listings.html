{% extends 'myapp/base.html' %}
{% block body %}
<div class="text-2xl m-10 p-10 font-bold">
   💼 My listings
</div>
{% for product in products %}
<div class="itemcontainer flex shadow-lg m-10 p-10">
    <span class="w-1/5">
        {% if product.image %}
            <img class="w-40 h-40" src="{{ product.image.url }}" alt="">
        {% else %}
            <div class="w-40 h-40 flex items-center justify-center bg-gray-200">
                <p class="text-gray-500">No image available</p>
            </div>
        {% endif %}
    </span>
    <span class="w-2/5">
        <div class="font-bold text-gray-700">{{ product.name }}</div>
        <div class="text-pink-400">${{ product.price }}</div>
        <div>{{ product.des }}</div>
    </span>
    <span class="w-3/5  flex justify-end items-center gap-4">
        <a href="{% url 'myapp:update_products' product.id %}" class="px-4 py-2 bg-blue-500 text-white  rounded hover:bg-blue-700">Update</a>
        <a href="{% url 'myapp:delete_products' product.id %}" class="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-700">Delete</a>
</div>
{% endfor %}
{% endblock %}
