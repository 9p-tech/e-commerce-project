{% extends 'myapp/base.html' %}
{% load static %}
{% block body %}
<div class="flex justify-center "><p class="  text-green-500 text-8xl mt-4 text-gray-500 font-extrabold">+ADD <span class="text-black">PRODUCT</span></p></div>
<div class="flex justify-center items-center mt-12  " >
    <form method="POST" enctype="multipart/form-data" class="flex flex-col gap-4 p-20 w-1/2 bg-red-50 justify-center items-center border-green-500 rounded shadow-lg border-4 ">
        {% csrf_token %}
        
        <div>
            <label CLASS=" text-2xl font-semibold" for="NAME:-">NAME:-</label><br>
            <input class="px-5 py-2 text-xl rounded" placeholder="name" type="text" id="name" name="name">
        </div>
        <div>
            <label CLASS=" text-2xl font-semibold" for="PRICE">PRICE:-</label><br>
            <input class="px-5 py-2 text-xl rounded" placeholder="price" type="text" id="price" name="price">
        </div>
        <div>
            <label CLASS=" text-2xl font-semibold" for="DESCRIPTION">DESCRIPTION:-</label><br>
            <input class="px-5 py-2 text-xl rounded" placeholder="desc" type="text" id="des" name="des">
        </div>
        <div><input placeholder="desc" type="file" accept="image/*" id="upload"name="upload"></div>
        <div><input CLASS=" bg-green-500 hover:bg-green-600 text-white px-4 py-2 mr-6 rounded" type="submit" id="addproduct" name="add product" value="addproduct"></div>
        
    </form>
</div>    
{% endblock %}
